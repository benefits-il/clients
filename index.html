<style>
  :root{ --canvas:#FFFBEB; --depth:#064E3B; --ink:#0F172A; --anchor:#047857; --green-mint:#6EE7B7; --green-soft:#D1FAE5; }
  *{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; height:100%; }
  body{ font-family:'Varela Round',system-ui,sans-serif; background:var(--depth); color:#fff;
    display:grid; place-items:center; min-height:100vh; overflow:hidden; }
  .card{ text-align:center; padding:40px; position:relative; z-index:1; }
  .logo{ width:78px; height:78px; margin:0 auto 22px; background:rgba(255,255,255,.06);
    border:2.5px solid var(--green-mint); border-radius:20px; display:grid; place-items:center; }
  .logo svg{ width:40px; height:52px; color:#fff; direction:ltr; overflow:visible; }
  h1{ font-family:'Rubik'; font-weight:900; font-size:clamp(34px,7vw,58px); margin:0 0 12px; letter-spacing:-1px; }
  p{ font-family:'Rubik'; font-weight:600; font-size:16px; color:var(--green-mint); margin:0; letter-spacing:.3px; }
  .blob{ position:absolute; border-radius:50%; opacity:.10; z-index:0; }
  .b1{ width:340px; height:340px; background:var(--green-mint); top:-110px; left:-120px; }
  .b2{ width:260px; height:260px; background:var(--anchor); bottom:-90px; right:-90px; opacity:.18; }
</style>
</head>
